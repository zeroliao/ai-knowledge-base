name: Build FastGPT image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: FastGPT image tag to build
        required: true
        default: url-directory-005
  push:
    branches:
      - main
    paths:
      - fastgpt/**
      - ops/deploy/server/docker-compose.server.override.yml
      - .github/workflows/build-fastgpt-image.yml

permissions:
  contents: read
  packages: write

env:
  LOCAL_IMAGE_NAME: fastgpt-custom
  GHCR_IMAGE_NAME: ghcr.io/zeroliao/ai-knowledge-base-fastgpt
  DEFAULT_IMAGE_TAG: url-directory-005

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          tag="${{ github.event.inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="${DEFAULT_IMAGE_TAG}"
          fi
          if [ "$tag" != "${DEFAULT_IMAGE_TAG}" ]; then
            echo "Only ${DEFAULT_IMAGE_TAG} can be deployed by this restricted workflow."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: fastgpt
          file: fastgpt/projects/app/Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.GHCR_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image archive
        shell: bash
        run: |
          docker pull "${GHCR_IMAGE_NAME}:${{ steps.meta.outputs.tag }}"
          docker tag "${GHCR_IMAGE_NAME}:${{ steps.meta.outputs.tag }}" "${LOCAL_IMAGE_NAME}:${{ steps.meta.outputs.tag }}"
          docker save "${LOCAL_IMAGE_NAME}:${{ steps.meta.outputs.tag }}" | gzip > "/tmp/fastgpt-custom-${{ steps.meta.outputs.tag }}.tar.gz"
          ls -lh "/tmp/fastgpt-custom-${{ steps.meta.outputs.tag }}.tar.gz"

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload image and compose override
        shell: bash
        run: |
          scp -i ~/.ssh/deploy_key -P "${{ secrets.DEPLOY_PORT }}" "/tmp/fastgpt-custom-${{ steps.meta.outputs.tag }}.tar.gz" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/fastgpt-custom-${{ steps.meta.outputs.tag }}.tar.gz"
          scp -i ~/.ssh/deploy_key -P "${{ secrets.DEPLOY_PORT }}" ops/deploy/server/docker-compose.server.override.yml "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/docker-compose.server.override.yml"

      - name: Deploy on server
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          sudo -n /usr/local/sbin/deploy-fastgpt-v004
          EOF
