name: Build FastGPT image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: FastGPT image tag to build
        required: true
        default: url-directory-004
  push:
    branches:
      - main
    paths:
      - fastgpt/**
      - ops/deploy/server/docker-compose.server.override.yml
      - .github/workflows/build-fastgpt-image.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/zeroliao/ai-knowledge-base-fastgpt
  DEFAULT_IMAGE_TAG: url-directory-004

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          tag="${{ github.event.inputs.image_tag }}"
          if [ -z "$tag" ]; then
            tag="${DEFAULT_IMAGE_TAG}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: fastgpt
          file: fastgpt/projects/app/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
