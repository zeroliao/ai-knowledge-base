# Server-only override. Keep public access behind Caddy.
services:
  fastgpt-app:
    ports: !override
      - "127.0.0.1:${FASTGPT_WEB_PORT:-3000}:3000"
    depends_on: !override
      fastgpt-mongo:
        condition: service_healthy
      fastgpt-vector:
        condition: service_healthy
      fastgpt-redis:
        condition: service_healthy
      fastgpt-minio:
        condition: service_healthy
      fastgpt-plugin:
        condition: service_healthy
    networks: !override
      - data
      - app
      - aiproxy
    mem_limit: 900m
    environment:
      STORAGE_EXTERNAL_ENDPOINT: ${STORAGE_EXTERNAL_ENDPOINT:-http://fastgpt-minio:9000}
      FE_DOMAIN: ${FASTGPT_FE_DOMAIN:-https://kb.zero007.chat}
      AGENT_SANDBOX_ENABLE_VOLUME: "false"

  fastgpt-plugin:
    mem_limit: 256m
    environment:
      STORAGE_EXTERNAL_ENDPOINT: ${STORAGE_EXTERNAL_ENDPOINT:-http://fastgpt-minio:9000}

  fastgpt-redis:
    command: >
      redis-server --requirepass mypassword --loglevel warning --maxclients 1000
      --appendonly yes --save 60 10 --maxmemory 128mb --maxmemory-policy allkeys-lru

  fastgpt-minio:
    ports: !override
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    mem_limit: 256m

  fastgpt-mongo:
    mem_limit: 512m

  fastgpt-vector:
    mem_limit: 256m

  fastgpt-aiproxy:
    ports:
      - "127.0.0.1:${AIPROXY_PORT:-3001}:3000"
    mem_limit: 192m

  fastgpt-code-sandbox:
    profiles:
      - disabled

  fastgpt-mcp-server:
    profiles:
      - disabled

  opensandbox-server:
    profiles:
      - disabled

  fastgpt-volume-manager:
    profiles:
      - disabled
